<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BOYINGTON WEB RADIO</title>

<style>

/* ========================================================= */
/* RESET */
/* ========================================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    overflow-x:hidden;
    background-image:
    linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.92)),
    url('arrière-plan-boyington-radio.jpg');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* ========================================================= */
/* HERO */
/* ========================================================= */

.hero{
    text-align:center;
    padding:40px 20px 20px;
}

.hero-logo{
    width:140px;
    max-width:90%;
    margin-bottom:15px;
    filter:
    drop-shadow(0 0 15px rgba(255,0,0,0.4))
    drop-shadow(0 0 40px rgba(255,0,0,0.2));
}

.hero h1{
    font-size:48px;
    font-weight:900;
    letter-spacing:4px;
    color:#ffffff;
    text-shadow:
    0 0 10px rgba(255,0,0,0.6),
    0 0 30px rgba(255,0,0,0.3);
}

.hero p{
    margin-top:10px;
    color:#bbbbbb;
    font-size:18px;
    letter-spacing:2px;
}

/* ========================================================= */
/* PLAYER SECTION */
/* ========================================================= */

.player-section{
    width:100%;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.player-grid{
    display:grid;
    grid-template-columns:1fr 380px;
    gap:35px;
    align-items:center;
}

.player-box{
    background:rgba(10,10,10,0.92);
    border-radius:28px;
    padding:25px;
    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 0 20px rgba(255,0,0,0.15),
    0 0 60px rgba(255,0,0,0.08);
}

/* ========================================================= */
/* MP4 MICRO ANIMÉ */
/* ========================================================= */

.radio-micro-container{
    display:flex;
    justify-content:center;
    align-items:center;
}

.radio-micro-video{
    width:100%;
    max-width:380px;
    border-radius:30px;

    border:2px solid rgba(255,255,255,0.08);

    box-shadow:
    0 0 25px rgba(255,0,0,0.35),
    0 0 60px rgba(255,0,0,0.12);

    background:#000;
}

/* ========================================================= */
/* DJ WORLD MATRIX */
/* ========================================================= */

.matrix-section{
    width:100%;
    max-width:1200px;
    margin:50px auto;
    padding:20px;
}

.matrix-video{
    width:100%;
    border-radius:30px;

    border:1px solid rgba(255,255,255,0.06);

    box-shadow:
    0 0 30px rgba(255,0,0,0.15),
    0 0 80px rgba(255,0,0,0.05);
}

/* ========================================================= */
/* GITHUB VISUAL */
/* ========================================================= */

.visual-section{
    width:100%;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.visual-image{
    width:100%;
    border-radius:30px;
    box-shadow:
    0 0 30px rgba(255,0,0,0.12);
}

/* ========================================================= */
/* OFFICIAL LINKS */
/* ========================================================= */

.links{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;

    margin:40px 20px;
}

.links a{
    text-decoration:none;
    color:white;
    padding:14px 28px;
    border-radius:14px;

    background:linear-gradient(145deg,#111,#1d1d1d);

    border:1px solid rgba(255,255,255,0.08);

    transition:0.3s;

    box-shadow:
    0 0 15px rgba(255,0,0,0.12);
}

.links a:hover{
    transform:translateY(-4px);

    box-shadow:
    0 0 25px rgba(255,0,0,0.35);
}

/* ========================================================= */
/* FOOTER */
/* ========================================================= */

footer{
    text-align:center;
    padding:40px 20px 60px;
    color:#888;
    font-size:14px;
}

.footer-logo{
    width:80px;
    margin-bottom:15px;
    opacity:0.95;
}

/* ========================================================= */
/* MOBILE */
/* ========================================================= */

@media(max-width:980px){

.player-grid{
    grid-template-columns:1fr;
}

.hero h1{
    font-size:34px;
}

}

</style>
</head>

<body>

<!-- ========================================================= -->
<!-- HERO -->
<!-- ========================================================= -->

<section class="hero">

<img src="logo_radio_boyington.png" class="hero-logo">

<h1>BOYINGTON WEB RADIO</h1>

<p>24/24 LIVE DJ EXPERIENCE</p>

</section>

<!-- ========================================================= -->
<!-- PLAYER + MICRO ANIMÉ -->
<!-- ========================================================= -->

<section class="player-section">

<div class="player-grid">

<div class="player-box">

<!-- PLAYER SOUNDCLOUD VERROUILLÉ -->

<iframe width="100%" height="450" scrolling="no" frameborder="no" allow="autoplay"
src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/playlists/000000000&color=%23ff0000&auto_play=true&hide_related=false&show_comments=false&show_user=true&show_reposts=false&visual=true">
</iframe>

</div>

<!-- ========================================================= -->
<!-- MP4 MICRO RADIO -->
<!-- ========================================================= -->

<div class="radio-micro-container">

<video class="radio-micro-video" autoplay muted loop playsinline>

<source src="boyington-radio-micro-animation.mp4" type="video/mp4">

</video>

</div>

</div>

</section>

<!-- ========================================================= -->
<!-- DJ WORLD MATRIX -->
<!-- ========================================================= -->

<section class="matrix-section">

<video class="matrix-video" autoplay muted loop playsinline>

<source src="dj-world-matrix.mp4" type="video/mp4">

</video>

</section>

<!-- ========================================================= -->
<!-- VISUEL STUDIO -->
<!-- ========================================================= -->

<section class="visual-section">

<img src="Studio-Console.jpg" class="visual-image">

</section>

<!-- ========================================================= -->
<!-- LIENS OFFICIELS -->
<!-- ========================================================= -->

<div class="links">

<a href="https://www.facebook.com/LoranBoyington/" target="_blank">
FACEBOOK OFFICIEL
</a>

<a href="https://www.tiktok.com/@boyingtonremixofficiel" target="_blank">
TIKTOK OFFICIEL
</a>

<a href="https://soundcloud.com/" target="_blank">
SOUNDCLOUD
</a>

</div>

<!-- ========================================================= -->
<!-- FOOTER -->
<!-- ========================================================= -->

<footer>

<img src="logo_radio_boyington.png" class="footer-logo">

<p>
© BOYINGTON WEB RADIO — OFFICIAL DJ STREAM EXPERIENCE
</p>

</footer>

</body>
</html>
