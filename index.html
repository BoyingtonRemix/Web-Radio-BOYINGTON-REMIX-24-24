<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>BOYINGTON RADIO 24/24</title>

  <meta name="description" content="BOYINGTON RADIO 24/24" />
  <meta name="keywords" content="Boyington Radio, WebRadio, DJ Radio, SoundCloud Radio" />
  <meta name="author" content="BOYINGTON RADIO" />
  <meta name="robots" content="index, follow" />

  <style>
    :root{
      --bg:#050505;
      --panel:#0b0b0b;
      --silver:#d8d8d8;
      --text:#f2f2f2;
      --muted:#9c9c9c;
      --line:rgba(255,255,255,0.08);
      --shadow:0 20px 60px rgba(0,0,0,0.55);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      background:
      linear-gradient(rgba(0,0,0,0.78),rgba(0,0,0,0.88)),
      url('background-boyington-radio.jpg');
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      overflow-x:hidden;
    }

    .page{
      width:100%;
      max-width:1400px;
      margin:auto;
      padding:18px;
    }

    .shell{
      background:rgba(5,5,5,0.94);
      border:1px solid var(--line);
      border-radius:28px;
      overflow:hidden;
      box-shadow:var(--shadow);
      backdrop-filter:blur(6px);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:16px;
      padding:18px 22px;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,0.02);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .logo-box{
      width:60px;
      height:60px;
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.14);
      background:#111;
      flex-shrink:0;
    }

    .logo-box img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .brand-title{
      color:var(--silver);
      font-size:2rem;
      font-weight:800;
      letter-spacing:0.12em;
      text-transform:uppercase;
    }

    .nav-tabs{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .nav-tabs a{
      text-decoration:none;
      color:#fff;
      border:1px solid rgba(255,255,255,0.12);
      padding:10px 16px;
      border-radius:999px;
      background:rgba(255,255,255,0.03);
      transition:0.25s;
      font-size:0.92rem;
    }

    .nav-tabs a:hover{
      background:rgba(255,255,255,0.08);
      transform:translateY(-2px);
    }

    .hero{
      text-align:center;
      padding:34px 20px 22px;
      border-bottom:1px solid var(--line);
    }

    .hero h1{
      font-size:clamp(3rem,9vw,6rem);
      letter-spacing:0.14em;
      color:var(--silver);
      text-transform:uppercase;
      line-height:1;
    }

    .hero-live{
      margin-top:18px;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .pill{
      padding:10px 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.04);
      color:#fff;
      font-size:0.92rem;
    }

    .live{
      animation:blink 1.2s infinite;
    }

    @keyframes blink{
      50%{opacity:0.55;}
    }

    .content{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      padding:18px;
    }

    .card{
      background:rgba(255,255,255,0.02);
      border:1px solid var(--line);
      border-radius:24px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .card-header{
      padding:16px 20px;
      border-bottom:1px solid var(--line);
      color:var(--silver);
      text-transform:uppercase;
      letter-spacing:0.08em;
      font-size:0.9rem;
    }

    .card-body{
      padding:18px;
    }

    .cover-stage{
      position:relative;
      width:100%;
      aspect-ratio:1/1;
      overflow:hidden;
      border-radius:20px;
      background:#000;
      border:1px solid rgba(255,255,255,0.08);
    }

    .cover-live{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .cover-overlay{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      padding:18px;
      background:linear-gradient(transparent,rgba(0,0,0,0.88));
    }
